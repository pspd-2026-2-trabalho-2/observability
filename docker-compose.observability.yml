# Stack de observabilidade local: sobe os 4 serviços do backend (patient-data,
# data-transform, auth, api-gateway) + Postgres + Prometheus + Grafana, todos na
# mesma rede do compose, para o Prometheus fazer scrape por nome de serviço.
#
# Uso:
#   cp .env.example .env   # opcional — só se quiser mudar algum valor padrão
#   docker compose -f docker-compose.observability.yml up -d --build
#
# Prometheus:  http://localhost:9090  (Status > Targets deve mostrar 4 alvos UP)
# Grafana:     http://localhost:3000  (admin/admin)
# API Gateway: http://localhost:8090

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pspd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pspd}
      POSTGRES_DB: ${POSTGRES_DB:-hospital}
    ports:
      - "5433:5432"
    volumes:
      - ./postgres-init/00-create-keycloak-db.sql:/docker-entrypoint-initdb.d/00-create-keycloak-db.sql:ro
      - ../patient-data-service/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../patient-data-service/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pspd} -d ${POSTGRES_DB:-hospital}"]
      interval: 5s
      timeout: 5s
      retries: 10

  patient-data-service:
    build:
      context: ../patient-data-service
    depends_on:
      db:
        condition: service_healthy
    environment:
      GRPC_PORT: "50051"
      METRICS_PORT: "9090"
      DATABASE_URL: "postgres://${POSTGRES_USER:-pspd}:${POSTGRES_PASSWORD:-pspd}@db:5432/${POSTGRES_DB:-hospital}?sslmode=disable"
      LOG_LEVEL: "info"
    ports:
      - "50051:50051"
      - "9200:9090" # host:9200 -> evita conflitar com a UI do Prometheus (host:9090)

  data-transform-service:
    build:
      context: ../data-transform-service
    environment:
      GRPC_PORT: "50053"
      METRICS_PORT: "9091"
      PSEUDONYM_SALT: "${PSEUDONYM_SALT:-pspd-troque-este-salt}"
      LOG_LEVEL: "info"
    ports:
      - "50053:50053"
      - "9201:9091" # host:9201 -> evita conflitar com auth-service (também 9091 interno)

  auth-service:
    build:
      context: ../gateway-authorization-service
      dockerfile: Dockerfile.auth
    depends_on:
      - patient-data-service
    environment:
      AUTH_GRPC_PORT: "50052"
      AUTH_METRICS_PORT: "9091"
      PATIENT_DATA_TARGET: "patient-data-service:50051"
    ports:
      - "50052:50052"
      - "9202:9091" # host:9202 -> mesma porta interna do data-transform-service, host distinto

  api-gateway:
    build:
      context: ../gateway-authorization-service
      dockerfile: Dockerfile.gateway
    depends_on:
      auth-service:
        condition: service_started
      patient-data-service:
        condition: service_started
      data-transform-service:
        condition: service_started
      keycloak:
        condition: service_healthy
    environment:
      GATEWAY_PORT: "8080"
      AUTH_SERVICE_TARGET: "auth-service:50052"
      PATIENT_DATA_TARGET: "patient-data-service:50051"
      DATA_TRANSFORM_TARGET: "data-transform-service:50053"
      KEYCLOAK_URL: "http://keycloak:8080"
      KEYCLOAK_REALM: "hu"
    ports:
      - "8090:8080" # host:8090 -> evita conflito com um processo travado do Docker Desktop (wslrelay) na 8080 do host

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    depends_on:
      db:
        condition: service_healthy
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      # hostname fixo (URL completa, sintaxe hostname v2 do Keycloak 26):
      # garante que o `iss` do token bate com KEYCLOAK_URL do gateway
      # independente de como o cliente (k6, curl) alcançou o Keycloak (rede
      # do compose via "keycloak:8080" ou porta publicada no host 8081)
      KC_HOSTNAME: http://keycloak:8080
      # Postgres em vez do H2 embutido padrão de `start-dev`: o H2 não
      # aguenta grants de senha concorrentes para o mesmo usuário (gera
      # "invalid_grant" falso sob carga — achado nos testes k6 da Fase 3).
      KC_DB: postgres
      KC_DB_URL: "jdbc:postgresql://db:5432/keycloak"
      KC_DB_USERNAME: "${POSTGRES_USER:-pspd}"
      KC_DB_PASSWORD: "${POSTGRES_PASSWORD:-pspd}"
    volumes:
      - ../keycloak/realm:/opt/keycloak/data/import:ro
    ports:
      - "8081:8080" # host:8081 -> evita conflito com o compose standalone do repo keycloak (host:8080)
    healthcheck:
      # Keycloak 26: /health/ready fica na porta de management (9000), não na 8080.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && grep -q '\"status\": \"UP\"' <&3"]
      interval: 10s
      timeout: 5s
      retries: 12

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - patient-data-service
      - data-transform-service
      - auth-service
      - api-gateway

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
  prometheusdata:
  grafanadata:
